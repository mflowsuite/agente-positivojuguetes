<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tali — Positivo Juguetes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .store {
      text-align: center;
      padding: 40px 20px;
      max-width: 600px;
    }
    .store img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .store h1 {
      color: #D73135;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .store p {
      color: #555;
      font-size: 1rem;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      background: #D73135;
      color: white;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="store">
    <img src="https://raw.githubusercontent.com/mflowsuite/reviews-mflowsuite/master/assets/logos/1776798530800-gemini_generated_image_snymssnymssnymss.png" alt="Positivo Juguetes">
    <h1>Positivo Juguetes</h1>
    <p>Juegos de mesa, souvenirs personalizados, juegos didácticos y clásicos para niños.<br>Enviamos a todo el país 🎲</p>
    <span class="badge">Chateá con Tali →</span>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       CHATBOT TALI — CONFIGURACIÓN
       Para retoques menores buscá el comentario correspondiente
       y cambiá solo el valor entre comillas.
       Después hacé clic en "Commit changes" y listo.
  ═══════════════════════════════════════════════════════════════ -->
  <script type="module" defer>
    import Chatbot from "https://cdn.n8nchatui.com/v1/pole-embed-yard.js";
    Chatbot.init({

      // URL del webhook de n8n — NO tocar
      "n8nChatUrl": "https://fluky-n8n.lembgk.easypanel.host/webhook/positivojuguetes",

      "metadata": {},
      "theme": {

        // ── BOTÓN FLOTANTE ──────────────────────────────────────────
        "button": {
          "backgroundColor": "#555353",   // color de fondo del botón
          "right": 20,                    // distancia al borde derecho (px)
          "bottom": 20,                   // distancia al borde inferior (px)
          "size": 60,                     // tamaño del botón (px)
          "iconColor": "#ffffff",
          "customIconSrc": "https://raw.githubusercontent.com/mflowsuite/reviews-mflowsuite/master/assets/logos/1776798530800-gemini_generated_image_snymssnymssnymss.png",
          "customIconSize": 100,
          "customIconBorderRadius": 50,
          "autoWindowOpen": {
            "autoOpen": true,             // true = se abre solo / false = espera clic
            "openDelay": 2               // segundos antes de abrirse
          },
          "borderRadius": "rounded",
          "draggable": false
        },

        // ── TOOLTIP (globito arriba del botón) ──────────────────────
        "tooltip": {
          "showTooltip": true,
          "tooltipMessage": "🦁¿Te ayudo?🐯",   // texto del globito
          "tooltipBackgroundColor": "#D73135",
          "tooltipTextColor": "#ffffff",
          "tooltipFontSize": 15,
          "hideTooltipOnMobile": false           // true = ocultar en celular
        },

        // ── ESTILOS DE LOS BOTONES DE PRODUCTO — NO tocar ──────────
        "customCSS": "button.qr-btn { display: inline-block; background: rgba(255,255,255,0.92) !important; border: none !important; color: #D73135 !important; padding: 5px 14px !important; border-radius: 16px !important; font-size: 13px !important; font-weight: 600 !important; cursor: pointer !important; margin-top: 6px !important; font-family: inherit !important } button.qr-btn:hover { background: #ffffff !important }",

        "direction": "ltr",
        "allowProgrammaticMessage": true,
        "consentScreen": { "enabled": false },

        // ── VENTANA DEL CHAT ────────────────────────────────────────
        "chatWindow": {
          "borderRadiusStyle": "rounded",
          "avatarBorderRadius": 35,
          "messageBorderRadius": 30,
          "showTitle": true,
          "title": "👋Soy Tali asistente virtual de Positivo Juguetes",  // título arriba del chat
          "titleAvatarSrc": "https://raw.githubusercontent.com/mflowsuite/reviews-mflowsuite/master/assets/logos/1776798530800-gemini_generated_image_snymssnymssnymss.png",
          "avatarSize": 40,
          "welcomeMessage": "🐯Diseñamos y fabricamos🙉 juegos 🦁para compartir momentos🐒 divertidos!😻",  // primer mensaje que ve el usuario
          "errorMessage": "Ups...Error!",   // mensaje si falla la conexión
          "backgroundColor": "#ffffff",
          "height": 600,                    // alto del chat (px)
          "width": 400,                     // ancho del chat (px)
          "fontSize": 16,

          // ── BOTONES DE INICIO RÁPIDO ──────────────────────────────
          // Aparecen como sugerencias al abrir el chat
          "starterPrompts": [
            "❤️¿Quiero hacer una Compra?",
            "🏃‍♂️‍➡️¿Donde esta mi pedido?"
          ],
          "starterPromptFontSize": 15,

          "renderHTML": true,
          "clearChatOnReload": true,
          "showScrollbar": true,

          // ── MENSAJES DEL BOT ──────────────────────────────────────
          "botMessage": {
            "backgroundColor": "#D73135",  // color de fondo del globo del bot
            "textColor": "#fafafa",        // color del texto del bot
            "showAvatar": true,
            "avatarSrc": "https://raw.githubusercontent.com/mflowsuite/reviews-mflowsuite/master/assets/logos/1776798530800-gemini_generated_image_snymssnymssnymss.png",
            "showCopyToClipboardIcon": true
          },

          // ── MENSAJES DEL USUARIO ──────────────────────────────────
          "userMessage": {
            "backgroundColor": "#D73135",  // color de fondo del globo del usuario
            "textColor": "#050505",
            "showAvatar": true,
            "avatarSrc": "https://www.svgrepo.com/show/532363/user-alt-1.svg"
          },

          // ── CAMPO DE TEXTO ────────────────────────────────────────
          "textInput": {
            "placeholder": "Escribe tu pregunta🐣",  // texto de ayuda en el campo
            "backgroundColor": "#ffffff",
            "textColor": "#1e1e1f",
            "sendButtonColor": "#D73135",   // color del botón enviar
            "maxChars": 5000,
            "maxCharsWarningMessage": "You exceeded the characters limit. Please input less than 50 characters.",
            "autoFocus": true,
            "borderRadius": 6,
            "sendButtonBorderRadius": 50
          },

          // ── PIE DEL CHAT — NO tocar ───────────────────────────────
          "footer": {
            "isCustomTextEnabled": true,
            "customText": "<div style=\"text-align:center; margin-top:8px;\"><small style=\"display:inline-flex; align-items:center; gap:4px;\"><span style=\"opacity:0.6;\">Powered by</span><img src=\"https://dcdn-us.mitiendanube.com/stores/006/912/635/products/mflowsuite-1x1-otra-ec3d467fe5c5f2d79b17725707529550-1024-1024.jpg\" alt=\"MFlowSuite\" style=\"width:30px; height:30px; border-radius:50%; vertical-align:middle;\"><strong style=\"opacity:0.6;\">MFlowSuite</strong></small></div>"
          }
        }
      }
    });
  </script>

  <!-- Script de botones de producto — NO tocar -->
  <script>
    (function () {
      function processButtons(msgEl) {
        const html = msgEl.innerHTML;
        if (!html.includes('qr-btn')) return;
        const newHtml = html.replace(
          /&lt;button class="qr-btn" data-msg="([^"]+)" onclick="[^"]*"&gt;(.*?)&lt;\/button&gt;/g,
          (_, msg, label) => `<button class="qr-btn" data-qr="${msg.replace(/"/g, '&quot;')}">${label}</button>`
        );
        if (newHtml === html) return;
        msgEl.innerHTML = newHtml;
        msgEl.querySelectorAll('button.qr-btn[data-qr]').forEach(btn => {
          btn.addEventListener('click', () => window.Chatbot.sendMessage(btn.dataset.qr));
        });
      }
      setInterval(() => {
        const shadow = document.querySelector('n8nchatui-popup')?.shadowRoot;
        if (shadow) shadow.querySelectorAll('.n8n-chat-ui-bot-message').forEach(processButtons);
      }, 500);
    })();
  </script>
</body>
</html>
